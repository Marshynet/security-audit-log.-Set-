<!DOCTYPE html>
<html>
<head>
    <title>TERMINAL_OVERRIDE_V4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; font-size: 16px; line-height: 1.3; overflow-x: hidden; }
        .red { color: #FF3131; font-weight: bold; }
        .yellow { color: #FFFF00; }
        .green { color: #00FF41; }
        .white { color: #FFFFFF; }
        .crt { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%), linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,255,0,0.02), rgba(0,0,255,0.05)); background-size: 100% 4px, 4px 100%; pointer-events: none; z-index: 99; }
    </style>
</head>
<body>
    <div id="term"></div>
    <div class="crt"></div>
    <script>
        const t = document.getElementById('term');
        const randomHex = () => "0x" + Math.random().toString(16).toUpperCase().substr(2, 8);
        
        let logs = [
            {t: "> [BOOT] INITIALIZING KERNEL...", c: "green"},
            {t: "> [LOAD] LOADING EXPLOIT MODULES...", c: "green"},
            {t: "[!] WARNING: SECURE BOOT BYPASS ACTIVE", c: "yellow"},
            {t: "----------------------------------------", c: "white"},
            {t: "> SCANNING LOCAL NETWORK...", c: "green"},
            {t: `> TARGET FOUND: ${Array.from({length: 4}, () => Math.floor(Math.random() * 256)).join('.')}`, c: "white"},
            {t: "> ATTEMPTING HANDSHAKE...", c: "green"},
            {t: "[CRITICAL] FIREWALL INTERFERENCE DETECTED", c: "red"},
            {t: "> INJECTING PACKET OVERLOAD...", c: "yellow"},
        ];

        // Massive Data Dump (The "Ambitious" Part)
        for(let i=0; i<300; i++) {
            if(i % 15 === 0) logs.push({t: `> [INFO] STEALING DATA BLOCK_${i}...`, c: "green"});
            if(i % 20 === 0) logs.push({t: `[!] UNKNOWN ENCRYPTION AT ${randomHex()}`, c: "yellow"});
            logs.push({t: `${randomHex()}  [${randomHex()}]  DECRYPTING...`, c: i % 2 === 0 ? "green" : "white"});
        }

        logs.push(
            {t: "----------------------------------------", c: "white"},
            {t: "[SUCCESS] DATABASE ACCESS GRANTED", c: "white"},
            {t: "> EXTRACTING USERS/PASSWORDS...", c: "yellow"},
            {t: "> UPLOADING TO REMOTE SERVER...", c: "green"},
            {t: "[!] ALARM TRIGGERED - DISCONNECTING...", c: "red"},
            {t: "> CLEANING TRACKS...", c: "green"},
            {t: "> SESSION ENDED. GHOST MODE ACTIVE.", c: "white"}
        );

        let i = 0;
        function type() {
            if (i < logs.length) {
                const p = document.createElement('div');
                p.className = logs[i].c;
                p.innerText = logs[i].t;
                t.appendChild(p);
                window.scrollTo(0, document.body.scrollHeight);
                
                // Speed Logic: Slow for messages, lighting fast for Hex code
                let speed = logs[i].t.startsWith('0x') ? 5 : 400;
                i++;
                setTimeout(type, speed);
            }
        }
        type();
    </script>
</body>
</html>
