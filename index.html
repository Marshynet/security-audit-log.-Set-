<!DOCTYPE html>
<html>
<head>
    <title>ROOT@KERNAL_ACCESS</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: monospace; padding: 15px; font-size: 12px; line-height: 1.1; overflow: hidden; }
        .warn { color: red; font-weight: bold; }
        .success { color: white; }
        .crt { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.1) 50%), linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03)); background-size: 100% 3px, 3px 100%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="term"></div>
    <div class="crt"></div>
    <script>
        const logs = [
            "[OK] BOOTING SYSTEM...", "[OK] KERNEL LOADED", "[INFO] IP: " + Math.floor(Math.random()*255) + "." + Math.floor(Math.random()*255) + ".1.1",
            "---------------------------", "> BYPASSING FIREWALL...", "> ACCESSING /USER/DESKTOP", "> EXTRACTING LOGS...",
            "0x" + Math.random().toString(16).substr(2,8), "0x" + Math.random().toString(16).substr(2,8), "0x" + Math.random().toString(16).substr(2,8),
            "[WARN] ENCRYPTION DETECTED", "> BRUTE FORCING...", "[SUCCESS] KEYS RECOVERED",
            "> SYNCING WITH CLOUD...", "[PROGRESS] 25%", "[PROGRESS] 50%", "[PROGRESS] 75%", "[PROGRESS] 100%",
            "[CRITICAL] SESSION LOGGED"
        ];
        // Add 100 random hex lines to make it long/ambitious
        for(let i=0; i<100; i++) logs.splice(10, 0, "0x" + Math.random().toString(16).toUpperCase().substr(2, 8) + " [DATA_DUMP_STREAM_" + i + "]");

        let i = 0;
        const t = document.getElementById('term');
        function type() {
            if (i < logs.length) {
                const p = document.createElement('div');
                if(logs[i].includes('CRITICAL') || logs[i].includes('WARN')) p.className = 'warn';
                if(logs[i].includes('SUCCESS')) p.className = 'success';
                p.innerText = logs[i++];
                t.appendChild(p);
                window.scrollTo(0, document.body.scrollHeight);
                setTimeout(type, logs[i-1].startsWith('0x') ? 10 : 150);
            }
        }
        type();
    </script>
</body>
</html>
