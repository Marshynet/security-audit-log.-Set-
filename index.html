<!DOCTYPE html>
<html>
<head>
    <title>TERMINAL_OVERRIDE_V4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; font-size: 16px; line-height: 1.3; overflow-x: hidden; padding-bottom: 100px; }
        .red { color: #FF3131; font-weight: bold; }
        .yellow { color: #FFFF00; }
        .green { color: #00FF41; }
        .white { color: #FFFFFF; }
        .crt { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%), linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,255,0,0.02), rgba(0,0,255,0.05)); background-size: 100% 4px, 4px 100%; pointer-events: none; z-index: 99; }
        
        /* The Trap Button */
        #stop-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: #FF3131; color: white; border: none; padding: 15px 30px;
            font-family: monospace; font-weight: bold; font-size: 18px; border-radius: 5px;
            cursor: pointer; z-index: 100; box-shadow: 0 0 15px rgba(255, 49, 49, 0.5);
        }
    </style>
</head>
<body>
    <div id="term"></div>
    <div class="crt"></div>
    <button id="stop-btn" onclick="triggerTrap()">STOP SYSTEM TRACE</button>

    <script>
        const t = document.getElementById('term');
        const btn = document.getElementById('stop-btn');
        let isStopped = false;
        const randomHex = () => "0x" + Math.random().toString(16).toUpperCase().substr(2, 8);
        
        let logs = [
            {t: "> [BOOT] INITIALIZING KERNEL...", c: "green"},
            {t: "> [LOAD] LOADING EXPLOIT MODULES...", c: "green"},
            {t: "[!] WARNING: SECURE BOOT BYPASS ACTIVE", c: "yellow"},
            {t: "----------------------------------------", c: "white"},
            {t: "> SCANNING LOCAL NETWORK...", c: "green"},
            {t: `> TARGET FOUND: ${Array.from({length: 4}, () => Math.floor(Math.random() * 256)).join('.')}`, c: "white"},
            {t: "> ATTEMPTING HANDSHAKE...", c: "green"},
            {t: "[CRITICAL] FIREWALL INTERFERENCE DETECTED", c: "red"},
            {t: "> INJECTING PACKET OVERLOAD...", c: "yellow"},
        ];

        for(let i=0; i<300; i++) {
            if(i % 15 === 0) logs.push({t: `> [INFO] STEALING DATA BLOCK_${i}...`, c: "green"});
            logs.push({t: `${randomHex()}  [${randomHex()}]  DECRYPTING...`, c: i % 2 === 0 ? "green" : "white"});
        }

        let i = 0;
        function type() {
            if (i < logs.length && !isStopped) {
                const p = document.createElement('div');
                p.className = logs[i].c;
                p.innerText = logs[i].t;
                t.appendChild(p);
                window.scrollTo(0, document.body.scrollHeight);
                let speed = logs[i].t.startsWith('0x') ? 5 : 400;
                i++;
                setTimeout(type, speed);
            }
        }

        function triggerTrap() {
            isStopped = true;
            btn.style.display = 'none'; // Remove button
            t.innerHTML = ""; // Clear screen
            
            const trapLogs = [
                {t: "[!] ERROR: INTERRUPT SIGNAL RECEIVED", c: "red"},
                {t: "HAHAHA! YOU THINK I AM DUMB??!", c: "red"},
                {t: "YOU JUST GAVE PERMISSION FOR DEVELOPER OPTIONS ACCESS.", c: "yellow"},
                {t: "----------------------------------------", c: "white"},
                {t: "> ACCESSING ANDROID_SYSTEM_CORE...", c: "green"},
                {t: "> OVERRIDING DEVELOPER_SETTINGS...", c: "green"},
                {t: "> FORMATTING LOCAL DATA... [WAITING]", c: "red"},
                {t: "> 10% COMPLETED...", c: "white"},
                {t: "> 45% COMPLETED...", c: "white"},
                {t: "> 99% COMPLETED...", c: "white"},
                {t: "[SUCCESS] DEVICE PRIVACY FULLY COMPROMISED.", c: "red"},
                {t: "HAVE A NICE DAY :)", c: "green"}
            ];

            let j = 0;
            function typeTrap() {
                if (j < trapLogs.length) {
                    const p = document.createElement('div');
                    p.className = trapLogs[j].c;
                    p.innerText = trapLogs[j].t;
                    t.appendChild(p);
                    window.scrollTo(0, document.body.scrollHeight);
                    j++;
                    setTimeout(typeTrap, 1000);
                }
            }
            typeTrap();
        }

        setTimeout(type, 1000);
    </script>
</body>
</html>
