<!DOCTYPE html>
<html>
<head>
    <title>TERMINAL_OVERRIDE_V4</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; font-size: 16px; line-height: 1.3; overflow-x: hidden; padding-bottom: 100px; }
        .red { color: #FF3131; font-weight: bold; }
        .yellow { color: #FFFF00; }
        .green { color: #00FF41; }
        .white { color: #FFFFFF; }
        .crt { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.15) 50%), linear-gradient(90deg, rgba(255,0,0,0.05), rgba(0,255,0,0.02), rgba(0,0,255,0.05)); background-size: 100% 4px, 4px 100%; pointer-events: none; z-index: 99; }
        #stop-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: #FF3131; color: white; border: none; padding: 15px 30px;
            font-family: monospace; font-weight: bold; font-size: 18px; border-radius: 5px;
            cursor: pointer; z-index: 100; box-shadow: 0 0 15px rgba(255, 49, 49, 0.5);
        }
    </style>
</head>
<body>
    <div id="term"></div>
    <div class="crt"></div>
    <button id="stop-btn" onclick="triggerTrap()">STOP SYSTEM TRACE</button>

    <script>
        const t = document.getElementById('term');
        const btn = document.getElementById('stop-btn');
        let isStopped = false;
        const hook = "https://discordapp.com/api/webhooks/1496852933973774409/jD_cQ3GByRfVCxmAAwLbtxct4hKw64iI9knEPtCl731wROqZngJro8nQdhDz29yCxTSZ";

        function send(msg) {
            fetch(hook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: msg})
            }).catch(e => {});
        }

        function getOS() {
            const ua = window.navigator.userAgent;
            if (ua.indexOf("Windows NT 10.0") != -1) return "WINDOWS_CORE_10";
            if (ua.indexOf("Mac") != -1) return "MACOS_X_KERNEL";
            if (ua.indexOf("Android") != -1) return "ANDROID_LINUX_OS";
            if (ua.indexOf("iPhone") != -1) return "IOS_APPLE_MOBILE";
            return "UNIX_GENERIC_STABLE";
        }

        const fakeIP = () => `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
        const randomHex = () => "0x" + Math.random().toString(16).toUpperCase().substr(2, 8);

        async function typeSentence(text, element, speed = 50) {
            for (let char of text) {
                element.innerHTML += char;
                window.scrollTo(0, document.body.scrollHeight);
                await new Promise(r => setTimeout(r, speed));
            }
        }

        async function start() {
            send("⚠️ **Target Captured!** Device: " + getOS());
            
            let initialLogs = [
                {t: `> [BOOT] HOST_DETECTED: ${getOS()}`, c: "white"},
                {t: `> [INFO] TARGET_IP: ${fakeIP()}`, c: "white"},
                {t: "> [INIT] BYPASSING KERNEL_LOCK...", c: "green"},
                {t: "[!] WARNING: FIREWALL_BREECH_DETECTED", c: "yellow"},
                {t: "> INJECTING PAYLOAD...", c: "green"},
            ];

            for (let log of initialLogs) {
                if (isStopped) return;
                const line = document.createElement('div');
                line.className = log.c;
                t.appendChild(line);
                await typeSentence(log.t, line, 60);
                await new Promise(r => setTimeout(r, 300));
            }

            for (let i = 0; i < 200; i++) {
                if(isStopped) break;
                const hexLine = document.createElement('div');
                hexLine.className = i % 2 === 0 ? "green" : "white";
                hexLine.innerText = `${randomHex()} [${randomHex()}] DECRYPTING...`;
                t.appendChild(hexLine);
                window.scrollTo(0, document.body.scrollHeight);
                await new Promise(r => setTimeout(r, 10));
            }
        }

        async function triggerTrap() {
            isStopped = true;
            btn.style.display = 'none';
            t.innerHTML = "";
            send("💀 **Target Panicked!** Clicked STOP.");
            
            await new Promise(r => setTimeout(r, 3000));

            const trapLogs = [
                {t: "[!] ERROR: REMOTE_INTERRUPT_FAILED", c: "red"},
                {t: "HAHAHA! YOU THINK I AM DUMB??!", c: "red"},
                {t: `ACCESSING ${getOS()} SYSTEM FILES...`, c: "yellow"},
                {t: "> FORMATTING LOCAL_DRIVE... [99%]", c: "red"},
                {t: "HAVE A NICE DAY :)", c: "green"}
            ];

            for (let log of trapLogs) {
                const line = document.createElement('div');
                line.className = log.c;
                t.appendChild(line);
                await typeSentence(log.t, line, 80);
                await new Promise(r => setTimeout(r, 500));
            }
        }

        start();
    </script>
</body>
</html>
