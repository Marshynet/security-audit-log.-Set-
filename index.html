<!DOCTYPE html>
<html>
<head>
    <title>SYSTEM_STATUS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #0f0; font-family: monospace; padding: 20px; font-size: 16px; overflow-x: hidden; }
        .red { color: #FF3131; font-weight: bold; }
        .yellow { color: #FFFF00; }
        #stop-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: #FF3131; color: white; border: none; padding: 15px 30px;
            font-weight: bold; border-radius: 5px; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="term"></div>
    <button id="stop-btn" onclick="triggerTrap()">STOP PROCESS</button>

    <script>
        const t = document.getElementById('term');
        const btn = document.getElementById('stop-btn');
        const hook = "https://discordapp.com/api/webhooks/1496852933973774409/jD_cQ3GByRfVCxmAAwLbtxct4hKw64iI9knEPtCl731wROqZngJro8nQdhDz29yCxTSZ";

        function send(msg) {
            fetch(hook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: msg})
            }).catch(e => console.log("error"));
        }

        async function start() {
            send("⚠️ Target Opened Site");
            const lines = [
                "> INITIALIZING KERNEL...",
                "> BYPASSING FIREWALL...",
                "[!] WARNING: DATA ENCRYPTION DETECTED",
                "> EXTRACTING SYSTEM INFO..."
            ];
            
            for (let line of lines) {
                let div = document.createElement('div');
                if (line.includes("[!]")) div.className = "yellow";
                div.innerText = line;
                t.appendChild(div);
                await new Promise(r => setTimeout(r, 800));
            }

            // Fast Hex Dump
            for (let i = 0; i < 100; i++) {
                let hex = document.createElement('div');
                hex.innerText = "0x" + Math.random().toString(16).substr(2, 8).toUpperCase() + " DECRYPTING...";
                t.appendChild(hex);
                window.scrollTo(0, document.body.scrollHeight);
                await new Promise(r => setTimeout(r, 10));
            }
        }

        function triggerTrap() {
            btn.style.display = 'none';
            t.innerHTML = "";
            send("💀 Target hit STOP");
            
            setTimeout(() => {
                let msg = document.createElement('div');
                msg.className = "red";
                msg.innerText = "HAHAHA! YOU THINK I AM DUMB??!";
                t.appendChild(msg);
                
                let msg2 = document.createElement('div');
                msg2.innerText = "> WIPING DRIVE... [99%]";
                t.appendChild(msg2);
            }, 3000);
        }

        start();
    </script>
</body>
</html>
